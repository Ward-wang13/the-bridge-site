server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /resources/ {
        alias /data/thebridge/resources/;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location ^~ /updates/ {
        alias /data/thebridge/updates/;
        add_header Cache-Control "public, max-age=60";
        try_files $uri =404;
    }
}
